<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House Dashboard</title>
<style>
  :root {
    --bg: #14141a; --panel: #1d1d26; --panel2: #25252f;
    --text: #d8d8e0; --dim: #8a8a96; --accent: #b48ce8;
    --good: #6fce8f; --warn: #e8c66a; --bad: #e87a7a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { padding: 14px 20px; background: var(--panel);
           display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 18px; margin: 0; color: var(--accent); }
  header .sub { color: var(--dim); font-size: 13px; }
  nav { display: flex; gap: 4px; padding: 10px 16px 0; flex-wrap: wrap; }
  nav button { background: var(--panel); color: var(--dim); border: none;
               padding: 10px 18px; border-radius: 8px 8px 0 0; cursor: pointer;
               font-size: 15px; }
  nav button.active { background: var(--panel2); color: var(--text);
                      font-weight: 600; }
  main { padding: 16px 20px 40px; }
  .panel { background: var(--panel2); border-radius: 0 10px 10px 10px;
           padding: 16px; min-height: 300px; }
  table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  th { text-align: left; color: var(--dim); font-weight: 500; font-size: 13px;
       padding: 6px 10px; border-bottom: 1px solid #333; }
  td { padding: 7px 10px; border-bottom: 1px solid #2b2b36; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .ok { color: var(--good); } .warn { color: var(--warn); } .bad { color: var(--bad); }
  .dim { color: var(--dim); }
  .pill { display: inline-block; background: var(--panel); border-radius: 12px;
          padding: 1px 10px; margin: 1px 2px; font-size: 13px; }
  .card { background: var(--panel); border-radius: 8px; padding: 10px 14px;
          margin: 10px 0; }
  .card summary { cursor: pointer; list-style: none; }
  .card summary::-webkit-details-marker { display: none; }
  .card .head { display: flex; gap: 12px; flex-wrap: wrap; align-items: baseline; }
  .card .when { color: var(--dim); font-size: 13px; min-width: 130px; }
  .card .input { flex: 1; min-width: 200px; }
  pre { background: #101016; border-radius: 6px; padding: 10px; overflow-x: auto;
        font-size: 12.5px; white-space: pre-wrap; word-break: break-word; }
  .statgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
              gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--panel); border-radius: 8px; padding: 12px 14px; }
  .stat .v { font-size: 24px; font-weight: 600; }
  .stat .l { color: var(--dim); font-size: 13px; }
  .pager { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
  .pager button { background: var(--panel); color: var(--text); border: none;
                  padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  .pager button:disabled { opacity: 0.4; cursor: default; }
  .bar { background: var(--accent); height: 14px; border-radius: 3px;
         display: inline-block; vertical-align: middle; min-width: 2px; }
  h3 { margin: 18px 0 4px; font-size: 15px; color: var(--dim);
       text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<header>
  <h1>🏠 House Dashboard</h1>
  <span class="sub" id="uptime"></span>
  <span class="sub" id="refreshed"></span>
</header>
<nav id="tabs">
  <button data-tab="live" class="active">Live</button>
  <button data-tab="events">Exchanges</button>
  <button data-tab="stats">Stats</button>
  <button data-tab="users">Users</button>
  <button data-tab="health">Health</button>
</nav>
<main><div class="panel" id="content">Loading…</div></main>

<script>
const $ = (s) => document.querySelector(s);
let tab = "live", page = 0, liveTimer = null;

document.querySelectorAll("nav button").forEach(b => b.onclick = () => {
  document.querySelectorAll("nav button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  tab = b.dataset.tab; page = 0;
  render();
});

const esc = (s) => String(s ?? "").replace(/[&<>"]/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtUp = (s) => s >= 3600 ? `${Math.floor(s/3600)}h ${Math.floor(s%3600/60)}m`
                   : s >= 60 ? `${Math.floor(s/60)}m ${s%60}s` : `${s}s`;
const fmtTs = (ts) => ts ? new Date(ts).toLocaleString([], {month:"short",
  day:"numeric", hour:"2-digit", minute:"2-digit"}) : "—";

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${path} → ${r.status}`);
  return r.json();
}

async function render() {
  clearInterval(liveTimer);
  try {
    if (tab === "live") { await renderLive(); liveTimer = setInterval(renderLive, 4000); }
    else if (tab === "events") await renderEvents();
    else if (tab === "stats") await renderStats();
    else if (tab === "users") await renderUsers();
    else if (tab === "health") await renderHealth();
    $("#refreshed").textContent = "updated " + new Date().toLocaleTimeString();
  } catch (e) {
    $("#content").innerHTML = `<p class="bad">Failed to load: ${esc(e.message)}</p>`;
  }
}

async function renderLive() {
  const d = await api("/api/live");
  $("#uptime").textContent = `up ${fmtUp(d.uptime_s)}`;
  let h = `<h3>Watched channels</h3>
    <table><tr><th>Channel</th><th>Server</th><th>Status</th>
    <th class="num">Queued</th><th class="num">Buffer turns</th></tr>`;
  for (const c of d.channels) {
    h += `<tr><td>${esc(c.name)}</td><td class="dim">${esc(c.guild ?? "?")}</td>
      <td>${c.processing ? '<span class="warn">responding…</span>'
                         : '<span class="ok">idle</span>'}</td>
      <td class="num">${c.queued}</td><td class="num">${c.buffer_turns}</td></tr>`;
  }
  h += "</table>";
  h += `<h3>Cooldowns</h3>`;
  h += d.cooldowns.length
    ? d.cooldowns.map(c => `<span class="pill">${esc(c.user)} · ${c.remaining_s}s</span>`).join(" ")
    : `<span class="dim">none active</span>`;
  h += `<h3>Background</h3>
    <span class="pill">pending memory writes: ${d.pending_memory_writes}</span>`;
  $("#content").innerHTML = h;
}

async function renderEvents() {
  const d = await api(`/api/events?page=${page}&page_size=20`);
  let h = `<p class="dim">${d.total} entries in the log window (newest first)</p>`;
  for (const e of d.entries) {
    const badges = [];
    if (e.personas?.length) badges.push(`<span class="pill ok">${e.personas.map(esc).join(", ")}</span>`);
    if (e.turns) badges.push(`<span class="pill">${e.turns} turn${e.turns > 1 ? "s" : ""}</span>`);
    if (e.search_skipped === false) badges.push(`<span class="pill">🧠 ${e.memories_found} memories</span>`);
    if (e.search_skipped === true) badges.push(`<span class="pill dim">no memory search</span>`);
    if (e.latency_ms) badges.push(`<span class="pill">${(e.latency_ms/1000).toFixed(1)}s</span>`);
    if (e.total_tokens) badges.push(`<span class="pill">${e.total_tokens} tok</span>`);
    if (e.error) badges.push(`<span class="pill bad">⚠ ${esc(e.error)}</span>`);
    h += `<details class="card"><summary><div class="head">
        <span class="when">${fmtTs(e.ts)}</span>
        <span class="input">${esc((e.user_input ?? e.events[0].event).slice(0, 140))}</span>
        <span>${badges.join(" ")}</span>
      </div></summary>`;
    for (const ev of e.events) {
      h += `<h3>${esc(ev.event)}</h3><pre>${esc(JSON.stringify(ev, null, 2))}</pre>`;
    }
    h += `</details>`;
  }
  const last = (page + 1) * d.page_size >= d.total;
  h += `<div class="pager">
    <button onclick="page--; render()" ${page === 0 ? "disabled" : ""}>← Newer</button>
    <span class="dim">page ${page + 1} of ${Math.max(1, Math.ceil(d.total / d.page_size))}</span>
    <button onclick="page++; render()" ${last ? "disabled" : ""}>Older →</button>
  </div>`;
  $("#content").innerHTML = h;
}

async function renderStats() {
  const d = await api("/api/stats?days=30");
  const w = d.wire_window;
  const total = d.per_day.reduce((a, x) => a + x.messages, 0);
  const last7 = d.per_day.slice(-7).reduce((a, x) => a + x.messages, 0);
  const searchTotal = w.memory_searches + w.search_skips;
  let h = `<div class="statgrid">
    <div class="stat"><div class="v">${total}</div><div class="l">messages · 30 days</div></div>
    <div class="stat"><div class="v">${last7}</div><div class="l">messages · 7 days</div></div>
    <div class="stat"><div class="v">${searchTotal ? Math.round(w.memory_searches / searchTotal * 100) + "%" : "—"}</div>
      <div class="l">memory-search rate (log window)</div></div>
    <div class="stat"><div class="v">${w.avg_latency_ms ? (w.avg_latency_ms/1000).toFixed(1) + "s" : "—"}</div>
      <div class="l">avg response (p95 ${w.p95_latency_ms ? (w.p95_latency_ms/1000).toFixed(1) + "s" : "—"})</div></div>
    <div class="stat"><div class="v">${(w.prompt_tokens + w.completion_tokens).toLocaleString()}</div>
      <div class="l">tokens (log window, ${w.llm_calls} calls)</div></div>
  </div>`;
  const max = Math.max(1, ...d.per_day.map(x => x.messages));
  h += `<h3>Messages per day</h3><table>`;
  for (const x of d.per_day.slice(-30)) {
    h += `<tr><td style="width:110px" class="dim">${x.day}</td>
      <td><span class="bar" style="width:${Math.round(x.messages / max * 60)}%"></span>
      ${x.messages}</td></tr>`;
  }
  h += `</table><h3>Persona responses · 30 days</h3>`;
  h += d.per_persona.map(p =>
    `<span class="pill">${esc(p.persona)} · ${p.responses}</span>`).join(" ");
  $("#content").innerHTML = h;
}

async function renderUsers() {
  const d = await api("/api/users");
  let h = `<table><tr><th>User</th><th class="num">Messages</th><th>Last seen</th></tr>`;
  for (const u of d.users) {
    h += `<tr><td>${esc(u.name ?? u.user_id)}</td>
      <td class="num">${u.messages}</td>
      <td class="dim">${fmtTs(u.last_seen)}</td></tr>`;
  }
  h += `</table>`;
  if (!d.users.length) h = `<p class="dim">No attributed messages yet.</p>`;
  $("#content").innerHTML = h;
}

async function renderHealth() {
  const d = await api("/api/health");
  let h = `<h3>Reflections</h3>
    <table><tr><th>Persona</th><th>Last reflection</th></tr>`;
  for (const r of d.reflections) {
    h += `<tr><td>${esc(r.persona)}</td><td>${esc(r.last_date)}</td></tr>`;
  }
  h += `</table>
    <span class="pill">unreflected exchanges: ${d.unreflected_exchanges}</span>
    <h3>Recent errors (log window)</h3>`;
  if (d.recent_errors.length) {
    h += `<table><tr><th>When</th><th>Category</th><th>Error</th></tr>`;
    for (const e of d.recent_errors) {
      h += `<tr><td class="dim">${fmtTs(e.ts)}</td>
        <td class="bad">${esc(e.category)}</td><td>${esc(e.error)}</td></tr>`;
    }
    h += `</table>`;
  } else {
    h += `<span class="ok">none 🎉</span>`;
  }
  $("#content").innerHTML = h;
}

render();
</script>
</body>
</html>
