# House-v3 Configuration
# ======================
# This is the default config. Override values in config/local.yaml
# (which is .gitignored) for your environment.

# ── Provider ──────────────────────────────────────────────────────────
# OpenRouter is the only provider — it fronts Anthropic/Google/OpenAI/etc.
# through one OpenAI-compatible endpoint, so there's no provider to select.
provider:
  model: deepseek/deepseek-v3.2
  # api_key: set in .env or config/local.yaml
  max_tokens: 8192
  # Tuned for expressive personas that still hold the JSON scene structure.
  # temp/top_p sit in DeepSeek's recommended RP band (0.5-0.7 / 0.9-0.95).
  # frequency/presence penalties dropped 2026-06-17: community consensus is they
  # have limited/no effect on DeepSeek's API, and if honored a frequency penalty
  # mildly suppresses length (long prose repeats common tokens) — counter to the
  # verbosity we want. They were never proven load-bearing in smoke tests.
  temperature: 0.7
  top_p: 0.92

# Reflection model (used for daily reflections, query inference, etc.)
# Can be a cheaper/faster model since these are internal operations.
reflection_provider:
  model: qwen/qwen3-235b-a22b-2507
  max_tokens: 8192
  temperature: 0.5

# ── Personas ──────────────────────────────────────────────────────────
personas:
  - elvira
  - vireline
  - frank
  - zagna
  - ellie

# Default persona for single-persona mode
default_persona: elvira

# ── Memory ────────────────────────────────────────────────────────────
memory:
  data_dir: ./data
  embedding_dimension: 768
  embedding_model: nomic-embed-text-v1.5-onnx

  # Vector search defaults
  search:
    top_k: 15
    recency_weight: 0.1  # How much to favor recent memories (0 = pure similarity)

  # Daily reflection settings
  reflection:
    max_exchanges_per_reflection: 50

# ── Conversation ──────────────────────────────────────────────────────
conversation:
  max_turns: 50
  max_chars: 50000
  persistence: true

# ── Context Retrieval ─────────────────────────────────────────────────
context:
  max_results: 15
  max_relevant_chars: 8000

# ── Unified Generation ───────────────────────────────────────────────
# Single LLM call generates all persona responses as JSON.
# Replaces the old arbitrator + per-persona orchestrator pipeline.
unified:
  system_prompt_file: data/personas/unified_house.md
  # Output format the model is asked to produce and we parse back:
  #   transcript — labeled lines "Name: ..." (one turn per label). Lighter on
  #     the model than strict JSON and immune to the malformed-JSON-shape
  #     failure (e.g. "[false, 2025]") seen under deep context.
  #   json       — {"turns":[{"speaker","text"}]} via json_mode response_format.
  #   plain      — whole reply → fallback_persona (single-persona setups).
  output_format: transcript
  json_mode: true        # Only consulted when output_format is unset (legacy)
  fallback_persona: elvira  # If parsing fails, assign response to this persona
  # Hybrid generation. When a specific persona is addressed (a persona ping or a
  # reply to a persona), generate that persona's reply from its own solo prompt
  # in a dedicated call, instead of the unified scene + forced-persona filter. A
  # single ping is one isolated call (no other identities in context — kills the
  # gender bleed / malformed-shape / "dumped through one bot" failures). When 2+
  # personas are addressed at once they generate sequentially, each seeing the
  # prior ones' output so cross-talk survives. @Girls is unaffected — it always
  # uses the single unified call. Set false to revert to unified+filter.
  per_persona_when_addressed: true
  solo_prompt_dir: data/personas/solo  # One <persona>.md per persona

# ── TTS (Text-to-Speech) ────────────────────────────────────────────
tts:
  provider: kokoro
  lang_code: a           # Default language: a=American English, b=British
  output_format: wav     # wav, ogg, mp3
  sample_rate: 24000     # Kokoro native sample rate
  # output_dir: /tmp     # defaults to system temp dir
  voice_map:
    elvira:   af_heart     # American female — warm, expressive
    vireline: bf_emma      # British female — Vireline is British!
    frank:    am_fenrir     # American male — deeper, distinct
    zagna:    af_bella      # American female — distinct from Elvira
    ellie:    af_nova       # American female — distinct from others

# ── Query Inference ───────────────────────────────────────────────────
query_inference:
  enabled: true
  temperature: 0.3

# ── Discord ─────────────────────────────────────────────────────────
discord:
  # Channels to auto-watch on first startup, by name. Empty = watch nothing
  # until you run /watch in Discord. (Watch state then persists to
  # data/discord_watch_state.json and takes over from this list.)
  channels: []
  # channels:
  #   - general
  #   - the-den
  #   - elviras-room
  # Name of the shared role assigned to all persona bots. Pinging this role
  # (@Girls) summons the whole house; pinging an individual persona bot
  # summons only that persona. Messages with neither ping are ignored.
  girls_role: Girls
  # Slash-command operators by Discord user ID. On a server where you aren't
  # an Administrator you can't use the admin-gated commands (/watch, /status,
  # /reset_buffer, etc.), so list your own user ID here to authorize them by
  # identity. Server admins are always authorized too. Put real IDs in
  # config/local.yaml (gitignored), not here. Enable Discord Developer Mode →
  # right-click yourself → Copy User ID.
  owner_ids: []
  # Prefix for text-based admin commands (e.g. "!house watch"). These mirror
  # the slash commands but work with only the bot scope + message-content
  # intent — so they function on servers that didn't grant the slash-command
  # scope (applications.commands). Same admin/owner gating as the slash ones.
  command_prefix: "!house"
  # Abuse guards for public servers. Each trigger is a paid LLM call:
  # a user must wait this many seconds between triggers, and at most this
  # many messages may queue behind a channel's processing lock. Throttled
  # messages get a 🕐 reaction instead of a response.
  user_cooldown_seconds: 8
  max_queued_per_channel: 3

# ── Dashboard ─────────────────────────────────────────────────────────
# In-process web UI: live queue/buffers, exchange log browser, stats,
# users, health. host 0.0.0.0 = reachable from devices on your network
# (read-only); use 127.0.0.1 to keep it on this machine only.
dashboard:
  enabled: true
  host: 0.0.0.0
  port: 8765

# ── Logging ───────────────────────────────────────────────────────────
# house.log mirrors the console; wire.jsonl records full API payloads,
# raw model output, memory-search results, and parsed scenes. Both
# rotate at midnight and keep retention_days of history.
logging:
  level: INFO
  wire_tap: true
  log_dir: ./logs
  retention_days: 3
